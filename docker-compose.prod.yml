version: "3.9"

services:
  # =====================
  # PostgreSQL (Production)
  # =====================
  postgres:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-emefa}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-emefa}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-emefa}"]
      interval: 10s
      retries: 5
    networks:
      - emefa-network

  # =====================
  # Redis (Production)
  # =====================
  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      retries: 5
    networks:
      - emefa-network

  # =====================
  # Qdrant (Vector DB)
  # =====================
  qdrant:
    image: qdrant/qdrant:latest
    restart: always
    volumes:
      - qdrantdata:/qdrant/storage
    networks:
      - emefa-network

  # =====================
  # MinIO (S3 Storage)
  # =====================
  minio:
    image: minio/minio:latest
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - miniodata:/data
    networks:
      - emefa-network

  # =====================
  # Backend (FastAPI)
  # =====================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    environment:
      - APP_NAME=EMEFA
      - DEBUG=false
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-emefa}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-emefa}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-["https://emefa.app"]}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET=emefa-uploads
      - LLM_DEFAULT_PROVIDER=${LLM_PROVIDER:-openrouter}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-openrouter/hunter-alpha}
    ports:
      - "8000:8000"
    networks:
      - emefa-network

  # =====================
  # Frontend (Next.js)
  # =====================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    ports:
      - "3000:3000"
    networks:
      - emefa-network

  # =====================
  # Nginx (Reverse Proxy)
  # =====================
  nginx:
    image: nginx:alpine
    restart: always
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
      - certbot-data:/var/www/certbot
    networks:
      - emefa-network

  # =====================
  # Certbot (SSL)
  # =====================
  certbot:
    image: certbot/certbot
    volumes:
      - ./infra/nginx/ssl:/etc/letsencrypt
      - certbot-data:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h; done;'"
    networks:
      - emefa-network

volumes:
  pgdata:
  redisdata:
  qdrantdata:
  miniodata:
  certbot-data:

networks:
  emefa-network:
    driver: bridge
