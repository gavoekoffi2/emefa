name: Build EMEFA APK
on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build APK Debug
        run: ./gradlew assembleDebug

      - name: Upload APK Debug
        uses: actions/upload-artifact@v4
        with:
          name: EMEFA-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14

  release-apk:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: EMEFA-Debug-APK
          path: apk

      - name: Get version
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | grep -oP '(?<=")[^"]+')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "date=$(date +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-${{ steps.version.outputs.date }}
          name: EMEFA v${{ steps.version.outputs.version }} - Assistante IA Africaine
          files: apk/*.apk
          draft: false
          prerelease: true
          body: |
            EMEFA v${{ steps.version.outputs.version }} - Assistante Virtuelle IA Africaine par Pro Genius AI

            Installation:
            1. Telechargez l APK ci-dessous
            2. Activez Sources inconnues dans Parametres > Securite
            3. Installez et lancez EMEFA
            4. Configurez votre modele IA dans les parametres

            Fonctionnalites:
            - Interface Francais / Anglais
            - Mobile Money (Wave, Orange Money, MTN MoMo)
            - Integration WhatsApp Business
            - Traduction langues africaines
            - Design Pro Genius AI (Orange + Bleu)

            Developpe par Pro Genius AI
