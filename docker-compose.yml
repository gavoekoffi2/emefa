version: "3.9"

services:
  # =====================
  # PostgreSQL
  # =====================
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: emefa
      POSTGRES_PASSWORD: emefa
      POSTGRES_DB: emefa
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emefa"]
      interval: 5s
      retries: 5

  # =====================
  # Redis
  # =====================
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  # =====================
  # Qdrant (Vector DB)
  # =====================
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrantdata:/qdrant/storage

  # =====================
  # MinIO (S3-compatible storage)
  # =====================
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  # =====================
  # Ollama (Local LLM)
  # =====================
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollamadata:/root/.ollama

  # =====================
  # LiveKit Server
  # =====================
  livekit:
    image: livekit/livekit-server:latest
    command: --config /etc/livekit.yaml
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    volumes:
      - ./infra/livekit.yaml:/etc/livekit.yaml

  # =====================
  # EMEFA Backend (FastAPI)
  # =====================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # =====================
  # EMEFA Frontend (Next.js)
  # =====================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_LIVEKIT_URL: ws://localhost:7880
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

  # =====================
  # IronClaw Agent Runtime
  # =====================
  ironclaw:
    build:
      context: ./agent-core
      dockerfile: Dockerfile
    environment:
      LLM_BACKEND: ollama
      LLM_BASE_URL: http://ollama:11434
      LLM_MODEL: llama3.2:3b
      DATABASE_URL: postgres://emefa:emefa@postgres:5432/ironclaw
    ports:
      - "8090:8090"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started

  # =====================
  # WhatsApp QR Bridge (Baileys) - OPTIONAL
  # =====================
  whatsapp-qr:
    build:
      context: ./infra/whatsapp-qr-service
      dockerfile: Dockerfile
    ports:
      - "8095:8095"
    volumes:
      - whatsapp_sessions:/app/sessions
    environment:
      PORT: 8095
    profiles:
      - whatsapp-qr  # Only start with: docker compose --profile whatsapp-qr up

volumes:
  pgdata:
  redisdata:
  qdrantdata:
  miniodata:
  ollamadata:
  whatsapp_sessions:
